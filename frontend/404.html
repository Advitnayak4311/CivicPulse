<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  
  <!-- CDNs for Styles -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

  <!-- Common Navigation Bar -->
  <div id="common-navbar"></div>

  <main class="container my-auto text-center py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 5rem;"></i>
        <h1 class="display-4 fw-bold mt-3">404</h1>
        <h3 class="fw-bold mb-3 text-dark">Page Not Found</h3>
        <p class="text-muted-custom mb-4">The route you are trying to access does not exist, has been removed, or is unauthorized.</p>
        
        <div class="d-flex justify-content-center gap-3">
          <a href="index.html" class="btn btn-primary px-4"><i class="bi bi-house-door me-2"></i>Go to Home</a>
          <button type="button" class="btn btn-outline-secondary px-4" onclick="window.history.back()">
            <i class="bi bi-arrow-left me-2"></i>Go Back
          </button>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 bg-dark text-white border-top border-custom mt-auto">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 CivicPulse. All Rights Reserved.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
</body>
</html>
